<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gallery</title>
        <link rel="stylesheet" href="./src/output.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>

        <!-- Header -->
        <header class="h-[102px] w-full flex items-center relative ml-[6rem]">
            <!-- logo -->
             <a href="./index.html">
                <div class="flex flex-col h-[43.7px] w-[70px]">
                    <img src="./assets/Group 8.svg" alt="Brand Logo">
                    <img src="./assets/Vector.svg" alt="" class="object-cover h-[12.45px] w-[68.5]">
                </div>
             </a>
             
             <nav class="flex gap-6 ml-[36.5%] font-[roboto] text-[12px] leading-[12px] uppercase tracking-[20%] items-center">
                <div class="border-b border-t py-2 px-3 border-[#333333]">
                    <a href="./index.html">Main</a>
                </div>
                <a href="./gallery.html">Gallery</a>
                <a href="./projects.html">Projects</a>
                <a href="./certs.html">Certifications</a>
                <a href="./contacts.html">Contacts</a>
             </nav>
        </header>

        <!-- Main Section -->
        <main class="px-[6rem] my-16 flex-col flex justify-center">
            <div class="ml-8 font-[roboto]"> 
                <h1 class="text-[64px] leading-[64px] text-[#BDBDBD] font-light">Photo</h1>
                <h2 class="text-[64px] leading-[64px] text-[#333333] font-bold">Gallery</h2>
            </div>
            <div class="grid grid-cols-[repeat(5,210px)] items-center justify-center mx-auto gap-4 py-10">
                <div class="w-[210px] h-[260px] bg-[#C4C4C4]"></div>
                <img src="./assets/g1.png" alt="">
                <img src="./assets/g2.png" alt="">
                <img src="./assets/g3.png" alt="">
                <img src="./assets/g4.png" alt="">
                <img src="./assets/g5.png" alt="">
                <img src="./assets/g6.png" alt="">
                <img src="./assets/g7.png" alt="">
                <img src="./assets/g8.png" alt="">
                <img src="./assets/g9.png" alt="">
            </div>
            <div class="flex text-[24px] leading-[24px] gap-8 text-[#BDBDBD] mt-14 h-[52px] ml-8 items-center">
                <div class="flex gap-6">
                    <div class="text-[#333333]">
                        <p>0<br>1</p>
                    </div>
                    <div class="w-[43.8px] h-0 border-2 border-[#E0E0E0] rotate-[134.98deg] mt-4">
                    </div>
                    <div class="text-[#BDBDBD]">
                        <p>05</p>
                    </div>
                </div>
                <div class="flex gap-4 -mt-4">
                    <div class="flex justify-center items-center h-[53px] w-[53px] border rotate-180 border-[#F2F2F2]">
                        <img src="./assets/arrow-2-right-long.svg" alt="">
                    </div>
                    <div class="flex h-[53px] w-[53px] border items-center justify-center border-[#F2F2F2] bg-[#F9F9F9]">
                        <img src="./assets/arrow-2-right-long.svg" alt="">
                    </div>
                </div>
            </div>
        </main>
        
        <!--Footer-->
        <footer class="bg-[#2C2C2C] pt-[2rem]">
            <div class="grid grid-cols-4 px-[6rem] py-6 gap-4 font-[roboto]">
                <div class="flex">
                    <img src="./assets/logoFoot.png" alt="" class="w-[145px] h-[94px]">
                </div>
                <div class="text-white flex flex-col gap-8">
        
                    <h6 class="text-[16px] font-bold">Information</h6>
                    <nav class="flex flex-col gap-4 text-[14px] leading-[24px] tracking-[3%] font-medium">
                        <a href="">Main</a>
                        <a href="">Gallery</a>
                        <a href="">Projects</a>
                        <a href="">Certifications</a>
                        <a href="">Contact</a>
                    </nav>
        
                </div>
                <div class="flex flex-col text-white gap-4 text-[14px] font-[roboto] leading-[24px] tracking-[3%] font-medium">
                    <h6 class="text-[16px] font-bold">Contacts</h6>
                    <div class="flex gap-x-4 mb-10">
                        <img src="./assets/Vector1.svg" alt="" class="w-[11px] h-[16px] ">
                        <p class="">1234 Sample Street<br>Austin Texas 78704</p>
                    </div>
                    <div class="flex gap-x-4 mb-8">
                        <img src="./assets/Group.svg" alt="" class="w-[16.01px] h-[16px] ">
                        <p class="">512.333.2222</p>
                    </div>
                    <div class="flex gap-x-4 ">
                        <img src="./assets/Group (1).svg" alt="" class="w-[16px] h-[11px] ">
                        <p class="">sampleemail@gmail.com</p>
                    </div>

                </div>
                <div class="flex flex-col">
                    <h6 class="text-white text-[16px] font-bold font-[roboto]">Social Media</h6>
                    <div class="flex gap-6 mt-4">
                        <img src="./assets/facebook.svg" alt="">
                        <img src="./assets/twitter.svg" alt="">
                        <img src="./assets/Linked In.svg" alt="">
                        <img src="./assets/pininterest.svg" alt="">
                    </div>
                </div>
            </div>

            <!-- Horizontal Line -->
            <div class=" opacity-10 h-[1px] bg-white w-full"></div>

            <!-- Copyright -->
            <div class="flex justify-center pt-6"><p class="text-[12px] leading-[22px] text-[#C8C8C880]/50">© 2021 All Rights Reserved</p></div>
            
        </footer>
    </body>
</html>
